  - aid: isometric-co:isometric-registry-api
    name: Isometric Registry API
    description: >-
      The Registry API exposes Isometric's public carbon removal registry —
      issuances, credit batches, organization credit balances, transfers,
      retirements, refunds, orders, deliveries, projects, suppliers, and
      project documents — alongside transactional operations to create
      transfers, retirements (including retire-from-oldest-credits),
      deliveries, beneficiaries, and Stripe checkout sessions. Operates
      against /registry/v0 on both sandbox and production environments using
      bearer + x-client-secret authentication. Includes 38 paths and 79
      schemas. Already consumed by CDR.fyi, MSCI, Sylvera, and CEEZER for
      real-time CDR market data.
