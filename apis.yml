aid: isometric-co
name: Isometric
description: >-
  Isometric is a London- and New York-based carbon removal registry and
  AI-native certification platform for the industrial economy, founded in 2022
  by Eamon Jubbawy (founder of Onfido). It operates the Isometric Registry — a
  public registry of high-durability carbon dioxide removal (CDR) credits — and
  Isometric Certify, the supplier-facing platform for project design, lifecycle
  assessment, measurement reporting and verification (MRV), and GHG statement
  submission. Isometric publishes scientific protocols across 14 CDR pathways
  including direct air capture, enhanced rock weathering, biochar, biomass
  carbon removal and storage (BiCRS), reforestation, mangrove restoration,
  wastewater alkalinity enhancement, and subsurface biomass storage, with
  modular sub-components for capture, feedstocks, LCA, and storage. Two public
  REST APIs are documented and versioned at /v0 — the Certify Data Ingestion
  API (53 paths, 170 schemas) for supplier MRV workflows, and the Registry API
  (38 paths, 79 schemas) for credit balances, issuances, transfers,
  retirements, deliveries, orders, and Stripe checkout. Both speak OpenAPI
  3.1.0, share bearer + x-client-secret authentication, run separate sandbox
  and production environments, and use Relay-style cursor pagination. No
  official SDKs are published; clients are expected to generate from the
  OpenAPI specs. An MCP server is available for AI assistant integration.
  Data providers including CDR.fyi, MSCI, Sylvera, and CEEZER consume the
  Registry API for real-time CDR market data.
