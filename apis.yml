apis:
  - aid: isometric-co:isometric-certify-api
    name: Isometric Certify Data Ingestion API
    description: >-
      The Certify API (MRV API) is the supplier-facing data ingestion surface
      for carbon removal projects. It covers sources and evidence uploads,
      datapoints, components and component blueprints, removals and removal
      templates, GHG statements, project storage units and locations,
      monitoring submissions, measurement locations and samples, sensors and
      time-series data uploads, feedstock types and batches, production
      batches, and biochar applications. Operates against /mrv/v0 on both
      sandbox and production environments using bearer + x-client-secret
      authentication. Includes 53 paths and 170 schemas.
    humanURL: https://docs.isometric.com/api-reference/certify/certify-introduction
    baseURL: https://api.isometric.com/mrv/v0
